<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <nav class="navbar">
    <div id="welcomeText" class="welcome-text"></div>
    <button onclick="logout()" class="logout-btn">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </nav>

<div class="container">
  <h1>Task Master</h1>
  
  <!-- Add Todo -->
  <div class="input-box">
    <input type="text" id="todoInput" placeholder="What needs to be done?" autocomplete="off" />
    <button onclick="addTodo()" class="add-btn">
      <i class="fas fa-plus"></i>
      Add
    </button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
  </div>

  <!-- Todo List -->
  <ul id="todoList"></ul>

</div>

<!-- Toast Notifications -->
<div id="toast-container"></div>



<script src="script.js"></script>
</body>
</html>
