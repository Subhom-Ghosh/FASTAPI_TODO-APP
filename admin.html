<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="admin.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>Admin Panel</h2>
    <div>
        <span id="adminName"></span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard">

    <!-- STATS -->
    <div class="cards">
        <div class="card">
            <h3>Total Users</h3>
            <p id="totalUsers">0</p>
        </div>

        <div class="card">
            <h3>Total Todos</h3>
            <p id="totalTodos">0</p>
        </div>

        <div class="card">
            <h3>Completed</h3>
            <p id="completedTodos">0</p>
        </div>

        <div class="card">
            <h3>Pending</h3>
            <p id="pendingTodos">0</p>
        </div>
    </div>

    <!-- USERS TABLE -->
    <h2>Users</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Username</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="usersTable"></tbody>
    </table>

    <!-- TODOS TABLE -->
    <h2>All Todos</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Status</th>
                <th>User</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="todosTable"></tbody>
    </table>

</div>

<script src="admin.js"></script>
</body>
</html>
